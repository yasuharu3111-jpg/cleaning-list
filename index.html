<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="掃除リスト">
<title>毎日の掃除チェックリスト</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f5f3ee;
  --surface: #ffffff;
  --text: #1a1a18;
  --muted: #888780;
  --border: rgba(0,0,0,0.1);
  --work: #2563eb;
  --work-bg: #eff6ff;
  --off: #16a34a;
  --off-bg: #f0fdf4;
  --accent: #1a1a18;
  --radius: 14px;
  --shadow: 0 2px 12px rgba(0,0,0,0.07);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body {
  font-family: 'Noto Sans JP', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  max-width: 480px;
  margin: 0 auto;
}
header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 1rem 1.25rem 0.875rem;
  position: sticky;
  top: 0;
  z-index: 10;
}
header h1 {
  font-size: 17px;
  font-weight: 700;
  letter-spacing: -0.02em;
}
header .sub {
  font-size: 12px;
  color: var(--muted);
  margin-top: 2px;
}
.tabs {
  display: flex;
  gap: 0;
  background: var(--bg);
  padding: 0.75rem 1rem;
  gap: 8px;
}
.tab {
  flex: 1;
  padding: 10px;
  border-radius: 10px;
  border: 1.5px solid transparent;
  font-size: 13px;
  font-weight: 500;
  font-family: 'Noto Sans JP', sans-serif;
  cursor: pointer;
  text-align: center;
  background: var(--surface);
  color: var(--muted);
  transition: all 0.15s;
}
.tab.active-work { background: var(--work-bg); border-color: var(--work); color: var(--work); }
.tab.active-off  { background: var(--off-bg);  border-color: var(--off);  color: var(--off); }
.page { display: none; }
.page.active { display: block; }

/* Calendar */
.cal-section { padding: 0 1rem 1rem; }
.cal-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0.875rem 0 0.75rem;
}
.cal-header span { font-size: 15px; font-weight: 700; }
.cal-header button {
  background: none; border: none; font-size: 20px;
  color: var(--muted); cursor: pointer; padding: 4px 8px;
  font-family: monospace;
}
.cal-legend {
  display: flex;
  gap: 12px;
  margin-bottom: 0.75rem;
  flex-wrap: wrap;
}
.leg {
  display: flex; align-items: center; gap: 6px;
  font-size: 12px; color: var(--muted); cursor: pointer;
  padding: 5px 10px; border-radius: 20px;
  background: var(--surface); border: 1px solid var(--border);
  transition: all 0.15s;
}
.leg.sel-work { background: var(--work-bg); border-color: var(--work); color: var(--work); font-weight: 500; }
.leg.sel-off  { background: var(--off-bg);  border-color: var(--off);  color: var(--off);  font-weight: 500; }
.leg.sel-none { background: #fef9ef; border-color: #d97706; color: #d97706; font-weight: 500; }
.dot { width: 10px; height: 10px; border-radius: 50%; }
.dot-work { background: var(--work); }
.dot-off  { background: var(--off); }
.dot-none { background: #d97706; }
.day-names {
  display: grid; grid-template-columns: repeat(7,1fr);
  gap: 4px; margin-bottom: 4px;
}
.day-names span {
  text-align: center; font-size: 11px; color: var(--muted); padding: 4px 0;
}
.cal-grid {
  display: grid; grid-template-columns: repeat(7,1fr); gap: 4px;
}
.dc {
  min-height: 56px; border-radius: 8px;
  display: flex; flex-direction: column; align-items: center;
  justify-content: flex-start; padding: 4px 2px;
  font-size: 13px; font-weight: 500;
  cursor: pointer; border: 1.5px solid transparent;
  background: var(--surface); color: var(--text);
  transition: all 0.12s; position: relative; overflow: hidden;
}
.dc-num { font-size: 13px; font-weight: 500; line-height: 1.4; flex-shrink: 0; }
.dc-tasks { width: 100%; margin-top: 2px; }
.dc-task { font-size: 8px; line-height: 1.3; white-space: nowrap; overflow: hidden;
  text-overflow: ellipsis; text-align: left; padding: 0 2px; opacity: 0.85; }
.dc-task.done-task { opacity: 0.4; text-decoration: line-through; }
.dc:active { transform: scale(0.93); }
.dc.today { border-color: var(--accent); }
.dc.work { background: var(--work-bg); color: var(--work); border-color: var(--work); }
.dc.off  { background: var(--off-bg);  color: var(--off);  border-color: var(--off); }
.dc.empty { background: none; border: none; cursor: default; }

/* Tasks page */
.tasks-section { padding: 0 1rem; }
.today-banner {
  margin: 0.875rem 0 1rem;
  padding: 12px 14px;
  border-radius: var(--radius);
  font-size: 13px;
  font-weight: 500;
}
.today-banner.work { background: var(--work-bg); color: var(--work); }
.today-banner.off  { background: var(--off-bg);  color: var(--off); }
.today-banner.none { background: #fffbeb; color: #92400e; }
.progress-bar { height: 4px; background: var(--border); border-radius: 2px; margin: 0.5rem 0 1.25rem; }
.progress-fill { height: 100%; border-radius: 2px; transition: width 0.3s; background: var(--work); }
.progress-fill.off { background: var(--off); }
.task-card {
  background: var(--surface);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  overflow: hidden;
  margin-bottom: 0.75rem;
}
.task-row {
  display: flex; align-items: center; gap: 12px;
  padding: 14px 16px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: background 0.12s;
  -webkit-user-select: none;
}
.task-row:last-child { border-bottom: none; }
.task-row:active { background: var(--bg); }
.chk {
  width: 22px; height: 22px; border-radius: 50%;
  border: 2px solid var(--border);
  flex-shrink: 0; display: flex; align-items: center;
  justify-content: center; transition: all 0.15s;
  font-size: 12px; color: white;
}
.task-row.done .chk { background: var(--off); border-color: var(--off); }
.task-row.done-work .chk { background: var(--work); border-color: var(--work); }
.task-lbl { font-size: 15px; flex: 1; transition: color 0.15s; }
.task-row.done .task-lbl, .task-row.done-work .task-lbl {
  color: var(--muted); text-decoration: line-through;
}
.del-btn {
  background: none; border: none; color: var(--muted);
  font-size: 18px; cursor: pointer; padding: 4px; line-height: 1;
  opacity: 0.4; transition: opacity 0.15s;
}
.del-btn:hover { opacity: 1; }
.add-area {
  background: var(--surface);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  display: flex; align-items: center; gap: 0;
  overflow: hidden;
  margin-bottom: 1.5rem;
}
.add-area input {
  flex: 1; border: none; outline: none;
  font-size: 15px; font-family: 'Noto Sans JP', sans-serif;
  padding: 14px 16px; background: none; color: var(--text);
}
.add-area input::placeholder { color: var(--muted); }
.add-area button {
  background: none; border: none; border-left: 1px solid var(--border);
  padding: 14px 18px; font-size: 22px; cursor: pointer;
  color: var(--muted); transition: color 0.15s;
}
.add-area button:active { color: var(--text); }
.reset-row {
  text-align: center; padding-bottom: 2rem;
}
.reset-btn {
  background: none; border: 1px solid var(--border);
  border-radius: 20px; padding: 8px 20px;
  font-size: 12px; color: var(--muted); cursor: pointer;
  font-family: 'Noto Sans JP', sans-serif;
}
.section-label {
  font-size: 11px; font-weight: 700; letter-spacing: 0.08em;
  color: var(--muted); text-transform: uppercase;
  padding: 0 0 0.5rem;
}
.task-lbl.editing {
  border: none; outline: none;
  background: var(--bg);
  border-radius: 6px;
  padding: 2px 6px;
  font-size: 15px;
  font-family: 'Noto Sans JP', sans-serif;
  color: var(--text);
  width: 100%;
  text-decoration: none !important;
}
.sub-chk {
  width: 16px; height: 16px; border-radius: 3px;
  border: 1.5px solid var(--border);
  flex-shrink: 0; display: flex; align-items: center;
  justify-content: center; transition: all 0.15s;
  font-size: 10px; color: white; cursor: pointer;
  margin-left: 4px;
}
.sub-chk.on { background: #f59e0b; border-color: #f59e0b; }
.edit-hint {
  font-size: 11px; color: var(--muted);
  text-align: right; padding: 0 16px 8px;
}
</style>
</head>
<body>

<header>
  <h1>🧹 毎日の掃除リスト</h1>
  <div class="sub" id="hdate"></div>
</header>

<div class="tabs">
  <button class="tab active-work" id="tab-cal" onclick="showPage('cal')">📅 カレンダー</button>
  <button class="tab" id="tab-tasks" onclick="showPage('tasks')">✅ チェック</button>
</div>

<!-- Calendar page -->
<div class="page active" id="page-cal">
  <div class="cal-section">
    <div class="cal-header">
      <button onclick="changeMonth(-1)">‹</button>
      <span id="cal-month-label"></span>
      <button onclick="changeMonth(1)">›</button>
    </div>
    <div class="cal-legend">
      <div class="leg sel-work" id="leg-work" onclick="setMode('work')">
        <div class="dot dot-work"></div>仕事の日
      </div>
      <div class="leg" id="leg-off" onclick="setMode('off')">
        <div class="dot dot-off"></div>休みの日
      </div>
      <div class="leg" id="leg-none" onclick="setMode('none')">
        <div class="dot dot-none"></div>クリア
      </div>
    </div>
    <div class="day-names">
      <span>日</span><span>月</span><span>火</span><span>水</span><span>木</span><span>金</span><span>土</span>
    </div>
    <div class="cal-grid" id="cal-grid"></div>
  </div>
  <div class="cal-section" id="cal-task-preview" style="padding-top:0;"></div>
</div>

<!-- Tasks page -->
<div class="page" id="page-tasks">
  <div class="tasks-section">
    <div class="today-banner none" id="today-banner">―</div>
    <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>

    <div class="section-label" id="task-section-label">タスク</div>
    <div class="task-card" id="task-list"></div>

    <div class="add-area">
      <input type="text" id="add-input" placeholder="タスクを追加…" maxlength="40">
      <button onclick="addTask()">＋</button>
    </div>

    <div class="reset-row">
      <button class="reset-btn" onclick="resetToday()">本日のチェックをリセット</button>
    </div>
  </div>
</div>

<script>
const MONTHS = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
const DAYS = ['日','月','火','水','木','金','土'];
const now = new Date();
const todayY = now.getFullYear(), todayM = now.getMonth(), todayD = now.getDate();

let calYear = todayY, calMonth = todayM;
let mode = 'work';
let schedule = JSON.parse(localStorage.getItem('cs2-sched') || '{}');
let workTasks = JSON.parse(localStorage.getItem('cs2-work') || '["洗面台を拭く"]');
let offTasks  = JSON.parse(localStorage.getItem('cs2-off')  || '["お風呂を洗う","キッチンのコンロを磨く","リビングを掃除機がけ","窓を拭く","ベッドシーツを整える"]');
let checks = JSON.parse(localStorage.getItem('cs2-chk-' + todayD) || '[]');
let subchecks = JSON.parse(localStorage.getItem('cs2-sub-' + todayD) || '[]');

function save() {
  localStorage.setItem('cs2-sched', JSON.stringify(schedule));
  localStorage.setItem('cs2-work', JSON.stringify(workTasks));
  localStorage.setItem('cs2-off', JSON.stringify(offTasks));
  localStorage.setItem('cs2-chk-' + todayD, JSON.stringify(checks));
  localStorage.setItem('cs2-sub-' + todayD, JSON.stringify(subchecks));
}

function showPage(p) {
  document.getElementById('page-cal').classList.toggle('active', p === 'cal');
  document.getElementById('page-tasks').classList.toggle('active', p === 'tasks');
  document.getElementById('tab-cal').className = 'tab' + (p === 'cal' ? ' active-work' : '');
  document.getElementById('tab-tasks').className = 'tab' + (p === 'tasks' ? ' active-work' : '');
  if (p === 'tasks') renderTasks();
  if (p === 'cal') renderCalPreview();
}

function setMode(m) {
  mode = m;
  document.getElementById('leg-work').className = 'leg' + (m === 'work' ? ' sel-work' : '');
  document.getElementById('leg-off').className  = 'leg' + (m === 'off'  ? ' sel-off'  : '');
  document.getElementById('leg-none').className = 'leg' + (m === 'none' ? ' sel-none' : '');
}

function changeMonth(d) {
  calMonth += d;
  if (calMonth < 0) { calMonth = 11; calYear--; }
  if (calMonth > 11) { calMonth = 0; calYear++; }
  renderCal();
}

function renderCal() {
  document.getElementById('cal-month-label').textContent = calYear + '年 ' + MONTHS[calMonth];
  const grid = document.getElementById('cal-grid');
  grid.innerHTML = '';
  const first = new Date(calYear, calMonth, 1).getDay();
  const days = new Date(calYear, calMonth + 1, 0).getDate();
  for (let i = 0; i < first; i++) {
    const el = document.createElement('div');
    el.className = 'dc empty'; grid.appendChild(el);
  }
  for (let d = 1; d <= days; d++) {
    const key = calYear + '-' + calMonth + '-' + d;
    const type = schedule[key];
    const isToday = (calYear === todayY && calMonth === todayM && d === todayD);
    const el = document.createElement('div');
    el.className = 'dc' + (type ? ' ' + type : '') + (isToday ? ' today' : '');

    const numDiv = document.createElement('div');
    numDiv.className = 'dc-num';
    numDiv.textContent = d;
    el.appendChild(numDiv);

    if (type) {
      const dayTasks = type === 'work' ? workTasks : offTasks;
      const dayChecks = calYear === todayY && calMonth === todayM
        ? checks : [];
      const tasksDiv = document.createElement('div');
      tasksDiv.className = 'dc-tasks';
      dayTasks.forEach((t, ti) => {
        const tEl = document.createElement('div');
        tEl.className = 'dc-task' + (dayChecks.includes(ti) ? ' done-task' : '');
        tEl.textContent = '· ' + t;
        tasksDiv.appendChild(tEl);
      });
      el.appendChild(tasksDiv);
    }

    el.onclick = () => {
      if (mode === 'none') delete schedule[key];
      else schedule[key] = mode;
      save(); renderCal();
    };
    grid.appendChild(el);
  }
  renderCalPreview();
}

function renderCalPreview() {
  const preview = document.getElementById('cal-task-preview');
  if (!preview) return;
  const type = todayType();
  const tasks = type === 'work' ? workTasks : type === 'off' ? offTasks : [];
  const mn = todayM + 1;

  if (!type) {
    preview.innerHTML = '<div style="padding:12px 0 4px;font-size:13px;color:var(--muted);">今日の種別を設定してください</div>';
    return;
  }

  let html = '<div style="padding:12px 0 6px;">';
  html += '<div class="section-label" style="margin-bottom:8px;">今日のやること（' + mn + '月' + todayD + '日）</div>';
  if (tasks.length === 0) {
    html += '<div style="font-size:13px;color:var(--muted);padding:4px 0;">タスクがありません</div>';
  } else {
    html += '<div class="task-card" style="margin-bottom:0;">';
    tasks.forEach((t, i) => {
      const isDone = checks.includes(i);
      const isSub = subchecks.includes(i);
      const color = type === 'work' ? 'var(--work)' : 'var(--off)';
      html += '<div class="task-row" style="padding:10px 14px;' + (isDone ? 'opacity:0.5;' : '') + '">'
        + '<div class="chk" style="' + (isDone ? 'background:' + color + ';border-color:' + color + ';' : '') + 'width:18px;height:18px;font-size:10px;">' + (isDone ? '✓' : '') + '</div>'
        + '<span class="task-lbl" style="font-size:14px;' + (isDone ? 'text-decoration:line-through;color:var(--muted);' : '') + '">' + t + '</span>'
        + '<div class="sub-chk' + (isSub ? ' on' : '') + '" style="pointer-events:none;">' + (isSub ? '✓' : '') + '</div>'
        + '</div>';
    });
    html += '</div>';
  }
  html += '</div>';
  preview.innerHTML = html;
}

function todayType() {
  return schedule[todayY + '-' + todayM + '-' + todayD] || null;
}

function renderTasks() {
  const type = todayType();
  const tasks = type === 'work' ? workTasks : type === 'off' ? offTasks : [];
  const banner = document.getElementById('today-banner');
  const label = document.getElementById('task-section-label');
  const fill = document.getElementById('progress-fill');
  const mn = todayM + 1;
  if (!type) {
    banner.className = 'today-banner none';
    banner.textContent = mn + '月' + todayD + '日 — カレンダーで今日の種別を設定してください';
    label.textContent = '―';
    fill.style.width = '0%';
    fill.className = 'progress-fill';
  } else {
    banner.className = 'today-banner ' + type;
    banner.textContent = mn + '月' + todayD + '日は' + (type === 'work' ? '仕事の日' : '休みの日') + 'です';
    label.textContent = type === 'work' ? '仕事の日のタスク' : '休みの日のタスク';
    const pct = tasks.length ? Math.round(checks.length / tasks.length * 100) : 0;
    fill.style.width = pct + '%';
    fill.className = 'progress-fill' + (type === 'off' ? ' off' : '');
  }

  const list = document.getElementById('task-list');
  list.innerHTML = '';
  if (!type || tasks.length === 0) {
    const row = document.createElement('div');
    row.style.cssText = 'padding:18px 16px;font-size:14px;color:var(--muted);';
    row.textContent = type ? 'タスクがありません。下から追加してください。' : 'カレンダーで今日の種別を設定してください。';
    list.appendChild(row);
    return;
  }
  tasks.forEach((t, i) => {
    const isDone = checks.includes(i);
    const row = document.createElement('div');
    row.className = 'task-row' + (isDone ? (type === 'off' ? ' done' : ' done-work') : '');

    const chk = document.createElement('div');
    chk.className = 'chk';
    chk.textContent = isDone ? '✓' : '';
    chk.onclick = (e) => {
      e.stopPropagation();
      if (checks.includes(i)) checks = checks.filter(x => x !== i);
      else checks.push(i);
      save(); renderTasks(); renderCalPreview();
    };

    const lbl = document.createElement('span');
    lbl.className = 'task-lbl';
    lbl.textContent = t;

    const del = document.createElement('button');
    del.className = 'del-btn';
    del.textContent = '×';
    del.onclick = (e) => { e.stopPropagation(); delTask(e, i); };

    const sub = document.createElement('div');
    sub.className = 'sub-chk' + (subchecks.includes(i) ? ' on' : '');
    sub.title = '追加チェック';
    sub.textContent = subchecks.includes(i) ? '✓' : '';
    sub.onclick = (e) => {
      e.stopPropagation();
      if (subchecks.includes(i)) subchecks = subchecks.filter(x => x !== i);
      else subchecks.push(i);
      save(); renderTasks(); renderCalPreview();
    };

    let pressTimer;
    lbl.addEventListener('pointerdown', () => {
      pressTimer = setTimeout(() => startEdit(lbl, i, type, tasks), 500);
    });
    lbl.addEventListener('pointerup', () => clearTimeout(pressTimer));
    lbl.addEventListener('pointercancel', () => clearTimeout(pressTimer));
    lbl.ondblclick = (e) => { e.stopPropagation(); startEdit(lbl, i, type, tasks); };

    row.appendChild(chk);
    row.appendChild(lbl);
    row.appendChild(sub);
    row.appendChild(del);
    list.appendChild(row);
  });

  if (tasks.length > 0) {
    const hint = document.createElement('div');
    hint.className = 'edit-hint';
    hint.textContent = '長押し（またはダブルクリック）でテキスト編集';
    list.appendChild(hint);
  }
}

function startEdit(lbl, i, type, tasks) {
  if (lbl.tagName === 'INPUT') return;
  const current = tasks[i];
  const inp = document.createElement('input');
  inp.type = 'text';
  inp.value = current;
  inp.className = 'task-lbl editing';
  inp.maxLength = 40;
  lbl.replaceWith(inp);
  inp.focus();
  inp.select();

  function commit() {
    const val = inp.value.trim();
    if (val && val !== current) {
      tasks[i] = val;
      save();
    }
    renderTasks();
  }
  inp.addEventListener('blur', commit);
  inp.addEventListener('keydown', e => {
    if (e.key === 'Enter') { inp.blur(); }
    if (e.key === 'Escape') { inp.value = current; inp.blur(); }
  });
}

function addTask() {
  const inp = document.getElementById('add-input');
  const val = inp.value.trim();
  if (!val) return;
  const type = todayType();
  if (type === 'work') workTasks.push(val);
  else if (type === 'off') offTasks.push(val);
  else { alert('先にカレンダーで今日の種別を設定してください。'); return; }
  inp.value = ''; save(); renderTasks();
}

function delTask(e, i) {
  e.stopPropagation();
  if (!confirm('このタスクを削除しますか？')) return;
  const type = todayType();
  if (type === 'work') workTasks.splice(i, 1);
  else if (type === 'off') offTasks.splice(i, 1);
  checks = checks.filter(x => x !== i).map(x => x > i ? x - 1 : x);
  subchecks = subchecks.filter(x => x !== i).map(x => x > i ? x - 1 : x);
  save(); renderTasks();
}

function resetToday() {
  if (!confirm('本日のチェックをリセットしますか？')) return;
  checks = []; subchecks = []; save(); renderTasks(); renderCalPreview();
}

// Init
document.getElementById('hdate').textContent = todayY + '年' + (todayM+1) + '月' + todayD + '日（' + DAYS[now.getDay()] + '）';
document.getElementById('add-input').addEventListener('keydown', e => { if (e.key === 'Enter') addTask(); });
renderCal();
